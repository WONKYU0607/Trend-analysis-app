name: AI 트렌드 분석

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 트렌드 분석 실행
        run: |
          echo "분석 시작..."
          for i in $(seq 1 10); do
            echo "배치 $i 실행 중..."
            STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
              -X POST "${{ secrets.VERCEL_URL }}/api/analyze" \
              -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
              -H "Content-Type: application/json")
            BODY=$(cat /tmp/resp.json)
            echo "배치 $i 결과 (HTTP $STATUS): $BODY"
            if [ "$STATUS" != "200" ]; then
              echo "API 오류 (HTTP $STATUS), 중단"
              exit 1
            fi
            echo "다음 배치까지 25초 대기..."
            sleep 25
          done
          echo "분석 완료"
