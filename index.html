<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS — 기술 트렌드 리서치</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&family=Pretendard:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #f5f4f0;
  --surface: #ffffff;
  --surface2:#fafaf8;
  --border:  #e8e6df;
  --border2: #d0cdc5;
  --text:    #1a1917;
  --text2:   #6b6860;
  --text3:   #a09d96;
  --accent:  #1a56db;
  --green:   #16a34a;
  --red:     #dc2626;
  --amber:   #d97706;
  --serif:   'Noto Serif KR', serif;
  --sans:    'Pretendard', -apple-system, sans-serif;
  --mono:    'JetBrains Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--sans); background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }

/* ── HEADER ── */
header {
  position:fixed; top:0; left:0; right:0; z-index:100;
  height:48px; display:flex; align-items:center; justify-content:space-between;
  padding:0 16px;
  background:rgba(245,244,240,0.95); backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}
.logo { font-family:var(--mono); font-size:13px; font-weight:500; letter-spacing:.1em; }
.logo span { color:var(--accent); }
nav { display:flex; gap:1px; }
nav button {
  background:none; border:none; color:var(--text3);
  font-family:var(--sans); font-size:12px; font-weight:500;
  padding:5px 12px; border-radius:6px; cursor:pointer; transition:all .15s;
}
nav button:hover { color:var(--text2); background:rgba(0,0,0,.04); }
nav button.active { color:var(--accent); background:rgba(26,86,219,.07); }

/* ── MAIN ── */
main { padding-top:48px; min-height:100vh; }
.page { display:none; animation:fadeIn .2s ease; }
.page.active { display:block; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* ── HOME ── */
.home-top {
  max-width:680px; margin:0 auto; padding:20px 16px 0;
  display:flex; align-items:flex-end; justify-content:space-between;
}
.home-title { font-family:var(--serif); font-size:22px; font-weight:700; }
.home-date  { font-family:var(--mono); font-size:10px; color:var(--text3); }
.stats-bar  {
  max-width:680px; margin:0 auto; padding:12px 16px 0;
  display:flex; align-items:center; gap:16px;
}
.stat-val  { font-family:var(--mono); font-size:17px; font-weight:500; }
.stat-lbl  { font-size:11px; color:var(--text3); margin-top:1px; }
.sdivider  { width:1px; height:22px; background:var(--border); }
.sec-lbl {
  max-width:680px; margin:18px auto 8px; padding:0 16px;
  font-size:10px; font-weight:600; letter-spacing:.1em;
  text-transform:uppercase; color:var(--text3);
}
.grid {
  max-width:680px; margin:0 auto;
  padding:0 12px 40px;
  display:flex; flex-direction:column; gap:6px;
}

/* ── CARD ── */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:14px 16px; cursor:pointer;
  transition:border-color .15s, box-shadow .15s;
  display:flex; flex-direction:column; gap:8px;
}
.card:hover { border-color:var(--accent); box-shadow:0 2px 14px rgba(26,86,219,.07); }
.card.hero  { border-color:var(--accent); border-width:1.5px; }
.hero-badge {
  display:inline-block; font-size:9px; font-weight:600;
  color:var(--accent); background:rgba(26,86,219,.08);
  padding:2px 7px; border-radius:4px;
}
.card-row  { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
.card-kw   { font-size:16px; font-weight:500; line-height:1.2; }
.score-pill {
  display:flex; align-items:center; gap:5px; flex-shrink:0;
  padding:3px 10px; border-radius:20px;
  background:var(--surface2); border:1px solid var(--border);
}
.sc-num { font-family:var(--mono); font-size:15px; font-weight:500; }
.sc-hi  { color:var(--green); }
.sc-mid { color:var(--amber); }
.sc-lo  { color:var(--text3); }
.badge  { font-family:var(--mono); font-size:9px; font-weight:500; padding:1px 5px; border-radius:4px; }
.b-up   { color:var(--green); background:rgba(22,163,74,.1); }
.b-dn   { color:var(--red);   background:rgba(220,38,38,.1); }
.b-fl   { color:var(--text3); background:var(--bg); }
.card-sum {
  font-size:13px; color:var(--text2); line-height:1.6;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.card-foot { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
.tag    { font-size:10px; padding:2px 8px; border-radius:5px; font-weight:500; }
.t-sec  { background:rgba(26,86,219,.08); color:var(--accent); }
.t-time { background:rgba(22,163,74,.08); color:var(--green); }
.t-conf { background:rgba(217,119,6,.08); color:var(--amber); }
.mini-bar { margin-left:auto; display:flex; align-items:center; gap:5px; }
.mbl { font-size:10px; color:var(--text3); }
.mbr { height:3px; width:56px; background:var(--border); border-radius:2px; overflow:hidden; }
.mbf { height:100%; border-radius:2px; }

/* ── DETAIL ── */
.report-wrap { max-width:680px; margin:0 auto; padding:20px 16px 60px; }
.back-btn {
  background:none; border:none; font-family:var(--sans); font-size:12px;
  color:var(--text3); cursor:pointer;
  display:flex; align-items:center; gap:4px;
  margin-bottom:18px; padding:0; transition:color .15s;
}
.back-btn:hover { color:var(--text2); }

.rpt-hdr { border-bottom:2px solid var(--text); padding-bottom:14px; margin-bottom:18px; }
.rpt-kw  { font-family:var(--serif); font-size:26px; font-weight:700; margin-bottom:4px; }
.rpt-hl  { font-size:13px; color:var(--accent); line-height:1.65; margin-bottom:8px; }
.rpt-meta { display:flex; gap:14px; flex-wrap:wrap; }
.rpt-mi   { font-size:11px; color:var(--text3); display:flex; align-items:center; gap:4px; }
.rpt-mv   { color:var(--text); font-family:var(--mono); font-weight:500; }

.score-bar {
  display:flex; align-items:center; gap:12px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:10px; padding:12px 16px; margin-bottom:20px;
}
.sc-big   { font-family:var(--mono); font-size:30px; font-weight:500; line-height:1; }
.sc-right { flex:1; }
.sc-lbl   { font-size:10px; color:var(--text3); letter-spacing:.08em; text-transform:uppercase; margin-bottom:5px; }
.sc-gauge { height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
.sc-fill  { height:100%; border-radius:2px; transition:width .4s; }
.sc-conf  { font-size:11px; color:var(--text2); margin-top:5px; }

.rpt-sec   { margin-bottom:20px; }
.rpt-sec-t {
  font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase;
  color:var(--text3); margin-bottom:9px;
  padding-bottom:6px; border-bottom:1px solid var(--border);
}
.rpt-summary {
  font-size:13px; color:var(--text); line-height:1.9;
  padding:12px 14px; background:var(--surface2);
  border-left:3px solid var(--accent); border-radius:0 8px 8px 0;
}

/* 근거 카드 */
.ev-list { display:flex; flex-direction:column; gap:5px; }
.ev-item {
  display:flex; gap:10px; padding:10px 12px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; cursor:pointer; transition:border-color .15s; align-items:flex-start;
}
.ev-item.no-link { cursor:default; }
.ev-item:not(.no-link):hover { border-color:var(--accent); }
.ev-icon {
  width:28px; height:28px; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:600; flex-shrink:0; margin-top:1px;
}
.ei-paper  { background:rgba(26,86,219,.09);  color:var(--accent); }
.ei-news   { background:rgba(22,163,74,.09);  color:var(--green); }
.ei-law    { background:rgba(220,38,38,.09);  color:var(--red); }
.ei-patent { background:rgba(217,119,6,.09);  color:var(--amber); }
.ei-policy { background:rgba(100,100,200,.09);color:#5850ec; }
.ev-body  { flex:1; min-width:0; }
.ev-title {
  font-size:12px; font-weight:500; color:var(--text);
  margin-bottom:3px; line-height:1.45;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.ev-meta  { font-size:10px; color:var(--text3); display:flex; gap:7px; flex-wrap:wrap; }
.ev-src   { font-family:var(--mono); color:var(--accent); }

.ev-more {
  width:100%; margin-top:6px; padding:9px;
  border:1px dashed var(--border2); border-radius:8px;
  background:none; color:var(--text3); font-size:12px;
  font-family:var(--sans); cursor:pointer; transition:all .15s;
}
.ev-more:hover { border-color:var(--accent); color:var(--accent); }

.chip-list { display:flex; gap:5px; flex-wrap:wrap; }
.chip      { font-size:11px; padding:4px 10px; border-radius:5px; }
.c-sig     { background:rgba(22,163,74,.08);  color:var(--green); }
.c-risk    { background:rgba(220,38,38,.07);  color:var(--red); }
.c-country { background:rgba(26,86,219,.07);  color:var(--accent); }

.two-col { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }

.rpt-tip {
  font-size:12px; color:var(--amber); line-height:1.75;
  padding:11px 14px; background:rgba(217,119,6,.05);
  border:1px solid rgba(217,119,6,.15); border-radius:8px;
}
.rpt-outlook { font-size:13px; color:var(--text); line-height:1.9; }

/* ── SEARCH ── */
.search-wrap { max-width:640px; margin:0 auto; padding:28px 16px; }
.search-wrap h2 { font-family:var(--serif); font-size:20px; margin-bottom:14px; }
.search-box { position:relative; margin-bottom:14px; }
.search-box input {
  width:100%; background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:11px 14px 11px 38px;
  color:var(--text); font-family:var(--sans); font-size:14px;
  outline:none; transition:border-color .15s;
}
.search-box input:focus { border-color:var(--accent); }
.si { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text3); width:16px; height:16px; }
.qtags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:18px; }
.qtag {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:4px 12px; font-size:11px;
  color:var(--text2); cursor:pointer; font-family:var(--sans); transition:all .15s;
}
.qtag:hover { border-color:var(--accent); color:var(--accent); }

/* ── ALERTS ── */
.alert-wrap { max-width:520px; margin:0 auto; padding:28px 16px; }
.alert-wrap h2 { font-family:var(--serif); font-size:20px; margin-bottom:14px; }
.input-row { display:flex; gap:8px; margin-bottom:18px; }
.input-row input {
  flex:1; background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:10px 14px; color:var(--text);
  font-family:var(--sans); font-size:13px; outline:none; transition:border-color .15s;
}
.input-row input:focus { border-color:var(--accent); }
.btn-add {
  background:var(--accent); border:none; border-radius:8px;
  padding:10px 16px; color:#fff; font-size:13px; font-weight:500;
  cursor:pointer; font-family:var(--sans);
}
.al-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:11px 14px; border-bottom:1px solid var(--border);
}
.al-kw { font-size:14px; font-weight:500; }
.al-rm { background:none; border:none; color:var(--text3); font-size:16px; cursor:pointer; }
.al-rm:hover { color:var(--red); }

/* ── SHARED ── */
.empty { text-align:center; padding:48px 20px; color:var(--text3); font-size:13px; }
.toast {
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--text); color:var(--surface);
  border-radius:8px; padding:9px 16px; font-size:12px;
  z-index:999; transition:transform .25s ease; white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); }
.skel {
  background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);
  background-size:200% 100%; animation:shim 1.4s infinite; border-radius:10px;
}
@keyframes shim { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

@media(max-width:600px) {
  .stats-bar { gap:12px; }
  .two-col   { grid-template-columns:1fr; }
  .rpt-kw    { font-size:22px; }
}
</style>
</head>
<body>

<header>
  <div class="logo"><span>ATLAS</span> RESEARCH</div>
  <nav>
    <button class="active" data-page="home" onclick="gotoPage('home',this)">리서치</button>
    <button data-page="search" onclick="gotoPage('search',this)">탐색</button>
    <button data-page="alerts" onclick="gotoPage('alerts',this)">알림</button>
  </nav>
</header>

<main>

<!-- 홈 -->
<div id="page-home" class="page active">
  <div class="home-top">
    <div class="home-title">기술 트렌드 리서치</div>
    <div class="home-date" id="upd">—</div>
  </div>
  <div class="stats-bar">
    <div><div class="stat-val" id="sT">—</div><div class="stat-lbl">트렌드</div></div>
    <div class="sdivider"></div>
    <div><div class="stat-val" id="sE">—</div><div class="stat-lbl">근거자료</div></div>
    <div class="sdivider"></div>
    <div><div class="stat-val" id="sC">—</div><div class="stat-lbl">커버리지</div></div>
  </div>
  <div class="sec-lbl" id="secLbl" style="display:none">급상승 트렌드</div>
  <div class="grid" id="homeGrid">
    <div class="skel" style="height:96px"></div>
    <div class="skel" style="height:96px"></div>
    <div class="skel" style="height:96px"></div>
  </div>
</div>

<!-- 상세 -->
<div id="page-detail" class="page">
  <div class="report-wrap">
    <button class="back-btn" onclick="gotoHome()">← 목록으로</button>
    <div id="detailBody"></div>
  </div>
</div>

<!-- 탐색 -->
<div id="page-search" class="page">
  <div class="search-wrap">
    <h2>기술 탐색</h2>
    <div class="search-box">
      <svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="searchInput" placeholder="키워드 검색..." oninput="doSearch(this.value)">
    </div>
    <div class="qtags" id="qtags"></div>
    <div class="grid" style="padding-left:0;padding-right:0" id="searchGrid"></div>
  </div>
</div>

<!-- 알림 -->
<div id="page-alerts" class="page">
  <div class="alert-wrap">
    <h2>관심 알림</h2>
    <div class="input-row">
      <input id="alertInput" placeholder="키워드 입력" onkeydown="if(event.key==='Enter')addAlert()">
      <button class="btn-add" onclick="addAlert()">등록</button>
    </div>
    <div id="alList"></div>
  </div>
</div>

</main>
<div class="toast" id="toast"></div>

<script>
const API = '/api/trends'
let allTrends = []
let alerts = JSON.parse(localStorage.getItem('atlas_al') || '[]')
let searchTimer

/* ── 유틸 ── */
function esc(s) {
  if (!s) return ''
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML
}
function scClass(s) { return s >= 70 ? 'sc-hi' : s >= 40 ? 'sc-mid' : 'sc-lo' }
function scColor(s) { return s >= 70 ? 'var(--green)' : s >= 40 ? 'var(--amber)' : 'var(--text3)' }
function badge(v) {
  v = Math.round(v || 0)
  if (v > 0) return `<span class="badge b-up">▲${v}</span>`
  if (v < 0) return `<span class="badge b-dn">▼${Math.abs(v)}</span>`
  return `<span class="badge b-fl">—</span>`
}
const FLAGS = { KR:'🇰🇷', US:'🇺🇸', EU:'🇪🇺', JP:'🇯🇵', CN:'🇨🇳', global:'🌐' }

/* ── 네비 ── */
function gotoPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'))
  document.getElementById('page-' + name).classList.add('active')
  if (btn) btn.classList.add('active')
  if (name === 'alerts') renderAlerts()
  window.scrollTo(0, 0)
}
function gotoHome() {
  gotoPage('home', document.querySelector('nav button[data-page="home"]'))
}

/* ── 카드 ── */
function mkCard(t, idx) {
  const r   = (t.reports && t.reports[0]) || {}
  const s   = Math.round(t.score || 0)
  const hero = idx === 0 && s > 0
  const col  = s >= 70 ? 'var(--green)' : s >= 40 ? 'var(--amber)' : 'var(--text3)'
  return `
  <div class="card${hero ? ' hero' : ''}" onclick="openDetail('${t.id}')">
    ${hero ? `<div class="hero-badge">▲ 주간 급등 #1</div>` : ''}
    <div class="card-row">
      <div class="card-kw">${esc(t.keyword)}</div>
      <div class="score-pill">
        <span class="sc-num ${scClass(s)}">${s}</span>
        ${badge(t.weekly_change)}
      </div>
    </div>
    <div class="card-sum">${esc(r.summary || '분석 리포트 생성 중...')}</div>
    <div class="card-foot">
      ${r.sector       ? `<span class="tag t-sec">${esc(r.sector)}</span>` : ''}
      ${r.time_horizon ? `<span class="tag t-time">${esc(r.time_horizon)}</span>` : ''}
      ${t.confidence_level === 'high' ? `<span class="tag t-conf">신뢰도 높음</span>` : ''}
      <div class="mini-bar">
        <span class="mbl">근거</span>
        <div class="mbr"><div class="mbf" style="width:${s}%;background:${col}"></div></div>
      </div>
    </div>
  </div>`
}

/* ── 근거 아이콘 ── */
const EV_ICON = {
  paper:  ['논', 'ei-paper'],
  news:   ['뉴', 'ei-news'],
  law:    ['법', 'ei-law'],
  patent: ['특', 'ei-patent'],
  policy: ['정', 'ei-policy']
}
function evIconHTML(type) {
  const [lbl, cls] = EV_ICON[type] || ['기', 'ei-paper']
  return `<div class="ev-icon ${cls}">${lbl}</div>`
}

/* ── 근거 아이템 ── */
function mkEvItem(e, noLink) {
  const d   = e.published_at ? new Date(e.published_at).toLocaleDateString('ko-KR') : ''
  const url = e.source_url || ''
  const cls = noLink || !url ? 'no-link' : ''
  const click = !noLink && url ? `data-url="${esc(url)}" onclick="openUrl(this)"` : ''
  return `
  <div class="ev-item ${cls}" ${click}>
    ${evIconHTML(e.type)}
    <div class="ev-body">
      <div class="ev-title">${esc(e.title)}</div>
      <div class="ev-meta">
        ${e.source_name ? `<span class="ev-src">${esc(e.source_name)}</span>` : ''}
        <span>${FLAGS[e.country] || '🌐'} ${esc(e.country || '')}</span>
        ${d ? `<span>${d}</span>` : ''}
      </div>
    </div>
  </div>`
}

function openUrl(el) {
  const url = el.dataset.url
  if (url) window.open(url, '_blank', 'noopener,noreferrer')
}

/* ── AI 하이라이트 아이템 ── */
function mkHlItem(h, i) {
  return `
  <div class="ev-item no-link">
    <div class="ev-icon ei-paper" style="font-family:var(--mono);font-size:10px">${i + 1}</div>
    <div class="ev-body">
      <div class="ev-title">${esc(h.title)}</div>
      <div class="ev-meta">
        <span>${esc(h.insight || '')}</span>
        ${h.country ? `<span>${FLAGS[h.country] || ''} ${esc(h.country)}</span>` : ''}
        ${h.company ? `<span>${esc(h.company)}</span>` : ''}
      </div>
    </div>
  </div>`
}

/* ── 상세 뷰 ── */
async function openDetail(id) {
  gotoPage('detail', null)
  document.getElementById('detailBody').innerHTML = `
    <div class="skel" style="height:34px;width:50%;margin-bottom:10px"></div>
    <div class="skel" style="height:58px;margin-bottom:10px"></div>
    <div class="skel" style="height:110px"></div>`

  try {
    const res = await fetch(`${API}?id=${id}`)
    if (!res.ok) throw new Error('api error')
    const { trend, report, evidence } = await res.json()

    const s    = Math.round(trend.score || 0)
    const col  = scColor(s)
    const rep  = report?.evidence_summary || {}

    const headline   = rep.headline || ''
    const summary    = rep.summary  || report?.summary || ''
    const prediction = report?.prediction || rep.prediction || ''
    const newsH      = rep.news_highlights   || []
    const paperH     = rep.paper_highlights  || []
    const lawH       = rep.law_highlights    || []
    const patentH    = rep.patent_highlights || []
    const companies  = rep.related_companies || []
    const signals    = rep.key_signals       || []
    const risks      = rep.risk_factors      || []
    const countries  = rep.countries_leading || []
    const investTip  = rep.investment_tip    || ''

    // 타입 순 정렬 통합 근거 (뉴스→논문→법안→특허→정책)
    const ORDER = ['news', 'paper', 'law', 'patent', 'policy']
    const allEv = ORDER.flatMap(k => evidence?.[k] || [])
    const evFirst = allEv.slice(0, 5)
    const evRest  = allEv.slice(5)

    // 관련 기업
    const companySection = companies.length ? `
    <div class="rpt-sec">
      <div class="rpt-sec-t">🏢 관련 기업</div>
      <div class="ev-list">
        ${companies.map(c => `
        <div class="ev-item no-link">
          <div class="ev-icon ei-paper">${FLAGS[c.country] || '🌐'}</div>
          <div class="ev-body">
            <div class="ev-title">
              ${esc(c.name)}
              ${c.ticker ? `<span style="font-family:var(--mono);font-size:10px;color:var(--accent);background:rgba(26,86,219,.08);padding:1px 5px;border-radius:3px;margin-left:4px">${esc(c.ticker)}</span>` : ''}
              ${c.type   ? `<span style="font-size:10px;color:var(--text3);margin-left:4px">${esc(c.type)}</span>` : ''}
            </div>
            <div class="ev-meta"><span>${esc(c.role || '')}</span></div>
          </div>
        </div>`).join('')}
      </div>
    </div>` : ''

    // AI 하이라이트 섹션 (값 있는 것만)
    function hlSection(icon, title, items) {
      if (!items || !items.length) return ''
      return `
      <div class="rpt-sec">
        <div class="rpt-sec-t">${icon} ${title}</div>
        <div class="ev-list">${items.map((h, i) => mkHlItem(h, i)).join('')}</div>
      </div>`
    }

    document.getElementById('detailBody').innerHTML = `

    <!-- 리포트 헤더 -->
    <div class="rpt-hdr">
      <div class="rpt-kw">${esc(trend.keyword)}</div>
      ${headline ? `<div class="rpt-hl">${esc(headline)}</div>` : ''}
      <div class="rpt-meta">
        <div class="rpt-mi">
          트렌드 점수
          <span class="rpt-mv" style="color:${col}">${s}/100</span>
          ${badge(trend.weekly_change)}
        </div>
        ${report?.sector       ? `<div class="rpt-mi">산업 <span class="rpt-mv">${esc(report.sector)}</span></div>`       : ''}
        ${report?.time_horizon ? `<div class="rpt-mi">시계 <span class="rpt-mv">${esc(report.time_horizon)}</span></div>` : ''}
      </div>
    </div>

    <!-- 점수바 -->
    <div class="score-bar">
      <div class="sc-big" style="color:${col}">${s}</div>
      <div class="sc-right">
        <div class="sc-lbl">Trend Score</div>
        <div class="sc-gauge">
          <div class="sc-fill" style="width:${s}%;background:${col}"></div>
        </div>
        ${trend.confidence_level ? `<div class="sc-conf">신뢰도: ${esc(trend.confidence_level)}</div>` : ''}
      </div>
    </div>

    <!-- 핵심 요약 -->
    ${summary ? `
    <div class="rpt-sec">
      <div class="rpt-sec-t">핵심 요약</div>
      <div class="rpt-summary">${esc(summary).replace(/\n/g,'<br>')}</div>
    </div>` : ''}

    <!-- 근거 자료 (뉴스·논문·법안·특허 통합) -->
    ${allEv.length ? `
    <div class="rpt-sec">
      <div class="rpt-sec-t">근거 자료 — 논문·뉴스·법안·특허 (${allEv.length}건)</div>
      <div class="ev-list">
        ${evFirst.map(e => mkEvItem(e, false)).join('')}
      </div>
      ${evRest.length ? `
      <div id="evMore" style="display:none">
        <div class="ev-list" style="margin-top:5px">
          ${evRest.map(e => mkEvItem(e, false)).join('')}
        </div>
      </div>
      <button class="ev-more" onclick="toggleMore(this, ${evRest.length})">
        더보기 +${evRest.length}건 ▼
      </button>` : ''}
    </div>` : ''}

    <!-- AI 하이라이트 (카테고리별) -->
    ${hlSection('📰', '뉴스 하이라이트', newsH)}
    ${hlSection('📄', '논문 하이라이트', paperH)}
    ${hlSection('⚖️', '정책·법안 하이라이트', lawH)}
    ${hlSection('📋', '특허 하이라이트', patentH)}

    <!-- 관련 기업 -->
    ${companySection}

    <!-- 핵심 신호 / 리스크 -->
    ${(signals.length || risks.length) ? `
    <div class="two-col">
      ${signals.length ? `
      <div class="rpt-sec" style="margin-bottom:0">
        <div class="rpt-sec-t">핵심 신호</div>
        <div class="chip-list">${signals.map(x => `<span class="chip c-sig">${esc(x)}</span>`).join('')}</div>
      </div>` : ''}
      ${risks.length ? `
      <div class="rpt-sec" style="margin-bottom:0">
        <div class="rpt-sec-t">리스크 요인</div>
        <div class="chip-list">${risks.map(x => `<span class="chip c-risk">${esc(x)}</span>`).join('')}</div>
      </div>` : ''}
    </div>` : ''}

    <!-- 주도 국가 -->
    ${countries.length ? `
    <div class="rpt-sec">
      <div class="rpt-sec-t">주도 국가</div>
      <div class="chip-list">
        ${countries.map(c => `<span class="chip c-country">${FLAGS[c] || '🌐'} ${esc(c)}</span>`).join('')}
      </div>
    </div>` : ''}

    <!-- 투자 포인트 -->
    ${investTip ? `
    <div class="rpt-sec">
      <div class="rpt-sec-t">💡 투자 포인트</div>
      <div class="rpt-tip">${esc(investTip)}</div>
    </div>` : ''}

    <!-- 향후 전망 -->
    ${prediction ? `
    <div class="rpt-sec">
      <div class="rpt-sec-t">🔮 향후 전망</div>
      <div class="rpt-outlook">${esc(prediction).replace(/\n/g,'<br>')}</div>
    </div>` : ''}
    `

  } catch (e) {
    document.getElementById('detailBody').innerHTML = `
      <div class="empty">
        데이터를 불러오지 못했습니다<br><br>
        <button class="back-btn" onclick="gotoHome()" style="margin:0 auto;display:inline-flex">← 목록으로</button>
      </div>`
    toast('데이터를 불러오지 못했습니다')
  }
}

function toggleMore(btn, total) {
  const el = document.getElementById('evMore')
  const hidden = el.style.display === 'none'
  el.style.display = hidden ? 'block' : 'none'
  btn.textContent = hidden ? '접기 ▲' : `더보기 +${total}건 ▼`
}

/* ── 검색 ── */
function doSearch(val) {
  clearTimeout(searchTimer)
  searchTimer = setTimeout(() => {
    const q = val.toLowerCase().trim()
    const grid = document.getElementById('searchGrid')
    if (!q) { grid.innerHTML = ''; return }
    const res = allTrends.filter(t => t.keyword.toLowerCase().includes(q))
    grid.innerHTML = res.length
      ? res.map((t, i) => mkCard(t, i)).join('')
      : `<div class="empty">검색 결과 없음</div>`
  }, 250)
}
function pickTag(el) {
  const kw = el.dataset.kw || ''
  document.getElementById('searchInput').value = kw
  gotoPage('search', document.querySelector('nav button[data-page="search"]'))
  doSearch(kw)
}

/* ── 알림 ── */
function renderAlerts() {
  const el = document.getElementById('alList')
  if (!alerts.length) { el.innerHTML = `<div class="empty">등록된 알림이 없습니다</div>`; return }
  el.innerHTML = alerts.map((a, i) => `
    <div class="al-item">
      <span class="al-kw">${esc(a)}</span>
      <button class="al-rm" onclick="rmAlert(${i})">×</button>
    </div>`).join('')
}
function addAlert() {
  const inp = document.getElementById('alertInput')
  const v = inp.value.trim()
  if (!v) return
  if (alerts.includes(v)) { toast('이미 등록됨'); return }
  alerts.push(v)
  localStorage.setItem('atlas_al', JSON.stringify(alerts))
  inp.value = ''; renderAlerts(); toast('등록 완료')
}
function rmAlert(i) {
  alerts.splice(i, 1)
  localStorage.setItem('atlas_al', JSON.stringify(alerts))
  renderAlerts()
}
function toast(msg) {
  const el = document.getElementById('toast')
  el.textContent = msg; el.classList.add('show')
  setTimeout(() => el.classList.remove('show'), 2200)
}

/* ── 홈 로드 ── */
async function loadHome() {
  try {
    const res = await fetch(API)
    if (!res.ok) throw new Error('api error')
    const data = await res.json()
    allTrends = data.trends || []
    const stats = data.stats || {}

    document.getElementById('sT').textContent = stats.trendCount || allTrends.length
    document.getElementById('sE').textContent = (stats.evidenceCount || 0).toLocaleString()
    document.getElementById('sC').textContent = stats.countryCount ? `${stats.countryCount}개국` : '—'
    if (allTrends.length && allTrends[0].updated_at) {
      document.getElementById('upd').textContent =
        new Date(allTrends[0].updated_at).toLocaleDateString('ko-KR') + ' 기준'
    }

    const grid = document.getElementById('homeGrid')
    if (!allTrends.length) {
      grid.innerHTML = `<div class="empty">데이터 수집 중입니다</div>`
      return
    }

    const sorted = [...allTrends].sort((a, b) => (b.score || 0) - (a.score || 0))
    document.getElementById('secLbl').style.display = 'block'
    grid.innerHTML = sorted.map((t, i) => mkCard(t, i)).join('')
    document.getElementById('qtags').innerHTML = sorted.slice(0, 8).map(t =>
      `<button class="qtag" data-kw="${esc(t.keyword)}" onclick="pickTag(this)">${esc(t.keyword)}</button>`
    ).join('')
  } catch (e) {
    document.getElementById('homeGrid').innerHTML =
      `<div class="empty">데이터를 불러오지 못했습니다</div>`
  }
}

renderAlerts()
loadHome()
</script>
</body>
</html>
